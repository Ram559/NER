services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ner_password}
      POSTGRES_DB: ${POSTGRES_DB:-ner_news}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ner} -d ${POSTGRES_DB:-ner_news}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PRETTY_LOGS: "false"
      INGESTION_CRON: "*/10 * * * *"
      PUBLIC_REFRESH_ENABLED: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-ner}:${POSTGRES_PASSWORD:-ner_password}@postgres:5432/${POSTGRES_DB:-ner_news}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: /api
      NUXT_API_INTERNAL_BASE: http://api:4000/api
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres-data:
